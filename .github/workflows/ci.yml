name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

permissions:
  contents: read

jobs:
  # Code quality checks
  lint:
    name: Check code quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pylint homeassistant

      - name: Run Ruff
        run: |
          ruff check custom_components/heiman_home/
          ruff format --check custom_components/heiman_home/

      - name: Run Pylint
        run: |
          pylint custom_components/heiman_home/ --disable=C0114,C0115,C0116,W0613,R0913,R0902,R0914,R0915,W0718,W0719,W1514

      - name: Run MyPy
        run: |
          mypy custom_components/heiman_home/ --ignore-missing-imports

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
