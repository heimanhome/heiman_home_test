name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Validate version in manifest
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/heiman_home/manifest.json'))['version'])")
          RELEASE_VERSION="${{ steps.get_version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Error: Manifest version ($MANIFEST_VERSION) does not match release version ($RELEASE_VERSION)"
            exit 1
          fi
          echo "Version validation passed: $RELEASE_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          if git describe --tags --abbrev=0 HEAD^ > /dev/null 2>&1; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^)
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "- Initial release" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive
        run: |
          cd custom_components
          zip -r ../heiman_home.zip heiman_home/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            ## Changes
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            
            ### HACS (Recommended)
            1. Open HACS → Integrations
            2. Click the three dots (⋮) → Custom repositories
            3. Add repository: `https://github.com/${{ github.repository }}` with category `Integration`
            4. Download and install
            
            ### Manual Installation
            1. Download `heiman_home.zip` from assets below
            2. Extract to your Home Assistant `custom_components` directory
            3. Restart Home Assistant
            
            ## Requirements
            - Home Assistant >= 2026.3.0
            - heiman-connect==${{ steps.get_version.outputs.version }}
          files: |
            heiman_home.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
